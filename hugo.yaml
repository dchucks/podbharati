# General Site Settings
baseURL: https://www.podbharati.com
languageCode: en-us
title: Podbharati | पॉडभारती

params:
    googleAnalytics: G-2LGN2L0VZY
    googleAdsense: ca-pub-7901545812270825
    logo: "/images/pb_transparent.png" # example "/images/logo.png".
    logo_dark: "/images/pb_transparent.png"
    color_scheme: "auto" # 3 modes auto, light, and dark. Auto mode: user can choose light or dark mode themself.
    description: "Your go-to destination for fascinating facts, insightful knowledge, and untold trivia."

    # Call to action button
    cta_button:
      enable: true
      cta_button_link: "/contact"
      cta_button_text: "Get in touch"

    # Hero Settings
    hero:
      enable: true
      hero_title: "Entertaining, Informative, Impactful"
      hero_description: "Your go-to destination for fascinating facts, insightful knowledge, and untold trivia."
      hero_buttontext: "More about us"

    # Announcement Banner
    announcement_banner:
      enable: true
      text: "हमारी नई पुस्तक 'पॉडकास्टिंग कैसे करें?' अब 📱 किंडल प्रारूप में केवल ₹199/- में उपलब्ध। <a href=\"https://www.amazon.in/dp/B0F7HVDVHD\" target=\"_blank\" rel=\"noopener noreferrer\">आज ही अपनी प्रति खरीदें!</a>"
    
    # Footer Settings
    footer:
        footer_description: "Welcome to Podbharati, your go-to destination for fascinating facts, insightful knowledge, and untold trivia. Dive into a treasure trove of intriguing tidbits and information spanning technology, history, science, society, and politics. Our goal is to not only expand your general knowledge but also arm you with fresh, exciting content to spark conversations with friends. Join us on this captivating journey of discovery, where each day brings something new, thought-provoking, and engaging!"

    # Social Links
    # Other icons can be found at https://fontawesome.com/icons
    social:
      - {
          icon: "fa-brands fa-youtube",
          name: "YouTube",
          link: https://youtube.com/@podbharati,
        }
      - {
          icon: "fa-brands fa-instagram",
          name: "Instagram",
          link: https://instagram.com/podbharati,
        }
      - {
          icon: "fa-brands fa-twitter",
          name: "Twitter (X)",
          link: https://x.com/podbharati,
        }
      - {
          icon: "fa-regular fa-envelope-open",
          name: "Newsletter",
          link: https://parikrama.substack.com/,
        }

    
    # Book Promo Section Settings
    book_promo:  
      enable: true
      section_title: "Have you read our new book? Its a self-starter guide for new podcasters."
      book_title: "अपनी आवाज़ को शक्ति दीजिए, और खुद को एक सफल पॉडकास्टर बनाइए।"
      book_subtitle: "A Complete Hindi Guide to Podcasting | नये पॉडकास्टर्स के लिये संपूर्ण मार्गदर्शिका!"
      book_blurb: "17 साल के अनुभव पर आधारित यह पुस्तक नए और अनुभवी पॉडकास्टर्स दोनों के लिए एक व्यावहारिक मार्गदर्शिका है। विषय चयन से लेकर मॉनेटाइजेशन तक, और AI टूल्स के प्रयोग तक — सब कुछ हिंदी में। Want to know more about the book and read an excerpt? Head over to the <a href=\"https://podcasting-guide.netlify.app/\" target=\"_blank\" rel=\"noopener noreferrer\">book's official website ↗️</a>, or grab your copy by clicking the buttons below."
      book_website: "https://podcasting-guide.netlify.app/"
      book_cover: "/images/posts/podcasting-book-cover.jpg"
      buy_links:
        - label: "Amazon (Paperback)"
          icon: "fa-brands fa-amazon"
          url: "https://www.amazon.in/dp/9334292393"
        - label: "Kindle eBook"
          icon: "fa-solid fa-tablet-screen-button"
          url: "https://www.amazon.in/dp/B0F7HVDVHD"
        - label: "Buy on Pothi.com"
          icon: "fa-solid fa-book"
          url: "https://store.pothi.com/book/debashish-chakrabarty-%E0%A4%AA%E0%A5%89%E0%A4%A1%E0%A4%95%E0%A4%BE%E0%A4%B8%E0%A5%8D%E0%A4%9F%E0%A4%BF%E0%A4%82%E0%A4%97-%E0%A4%95%E0%A5%88%E0%A4%B8%E0%A5%87-%E0%A4%95%E0%A4%B0%E0%A5%87%E0%A4%82/"
        - label: "Buy on Flipkart"
          icon: "fa-solid fa-cart-shopping"
          url: "https://www.flipkart.com/podcasting-kaise-karein-naye-podcasters-ke-liye-sampoorna-maargdarshikaa/p/itm09701e0288dd5?pid=9789334292398"


   # Newsletter
    newsletter:
        enable: true
        title: "Discover the world of audio & podcasts from around the world!"
        description: 

    # Tags Section Settings
    # You can add many tag sections to the homepage; each section will show the recent posts by the tag.
    tags_section:
        enable: true
        number_posts: 1
        number_columns: 4
        tags:
            - tag: ""
            - tag: ""
            - tag: ""
  
    # Podcasts Section Settings
    podcasts_section:
        enable: true
        number_posts: 1
        number_columns: 4
        section_title: "Our Shows"
    
    # Reviews Section Settings
    reviews_section:
        enable: true
        section_title: "What our listeners say!"
        featured_quote: "\"Podbharati is one show you just cannot afford to miss – excellent production quality, content delivery and choice of topics.\" — <a href='/reviews/amit-agarwal/'>Amit Agarwal ↗️</a>"

     # Author Section Settings
    authors_section:
        enable: false
        section_title: "Meet our Authors!"

    # Contact Settings
    # We have a built-in contact form, that you can use with Formspree service to handle up to 50 submissions per month for free.
    # You could also easily switch to another contact form service if you want.
    contact:
        email: "xpwzlllg" # Add your form_id

    # Comment Section (Disqus)
    disqus:
        enable: true
        disqusShortname: "podbharati" # Add your shortname for Disqus Comment. For example anvod-studio-test


# Taxonomies
taxonomies:
  author: "authors"
  tag: "tags"
  guest: "guests"
  podcast: "podcasts"
  category: "categories"
  review: "reviews"
  episode: "episodes"

# Navigation Settings
menus:
  main:
    - name: "Home"
      url: "/"
      weight: 1
    - name: "Our Shows"
      url: "/podcasts/"
      weight: 2
    - name: "Our Guests"
      url: "/guests/"
      weight: 3
    - name: "Tags"
      url: "/tags/"
      weight: 4
    - name: "Topics"
      url: "/categories/"
      weight: 5
    - name: "Reviews"
      url: "/reviews/"
      weight: 6
    - name: "Blogs"
      url: "/posts/"
      weight: 7
    - name: "📕 Podcasting Book"
      url: "https://podcasting-guide.netlify.app/"
      weight: 8
    - name: "About"
      url: "/about/"
      weight: 9
    - name: "Contact us"
      url: "/contact/"
      weight: 10
      
      
markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - html
    - rss
  section:
    - html
    - rss
  taxonomy:
    - html
    - rss
  term:
    - html
    
services:
  rss:
    limit: 10

markup.highlight:
  codeFences: true
  guessSyntax: true
  noClasses: false

sitemap:
  changeFreq: ""
  disable: false
  filename: sitemap.xml
  priority: -1
  